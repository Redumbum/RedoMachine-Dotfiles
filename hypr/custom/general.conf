#Put general config stuff here
# Here's a list of every variable: https://wiki.hyprland.org/Configuring/Variables/

$TERMINAL = kitty

#windowrulev2 = nofocus, class:.*

input {
  sensitivity = 1
  accel_profile = custom 5 .0 20
  natural_scroll = false
  kb_options = caps:escape
  

}
device {
    name = elan06a1:00-04f3:3232-touchpad
    sensitivity = .5
    natural_scroll = true
    accel_profile = custom 0 0 0
    enabled = true
  }

monitor = DP-1, 2560x1440@120, 2000x0, 1
#monitor = DP-1, 3440x1440@84.96, 2000x0, 1
monitor = eDP-1, 1920x1200@60, 0x0, 1
decoration {
inactive_opacity = 1
rounding = 15
blur{
  enabled = true
  size = 5
  noise = 0
  passes = 2
  popups = true
  xray = true
  
  }
}


binds{
    window_direction_monitor_fallback = false
  }

general {
border_size = 1
col.active_border = rgba(255,255,255,1)
col.inactive_border = rgba(255,255,255,0) 
gaps_out = 2
   }

cursor{
    hide_on_key_press = true
  }
workspace {

workspace = 1, monitor:DP-1
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1
workspace = 5, monitor:eDP-1
workspace = 6, monitor:eDP-1
workspace = 7, monitor:eDP-1
workspace = 8, monitor:eDP-1
}


inactive_opacity = 1




animations{
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = myBezier2, 0.34, 1.56, 0.64, 1

    animation = fade, 1, 20, myBezier
    animation = fadeIn, 1, 20, myBezier
    animation = fadeOut,1, 50, default


    animation = windowsMove, 1, 3, default, slide

    animation = windowsIn, 1, 4, myBezier, slide
    animation = windowsOut, 1, 5, myBezier2, slide  
    

    #animation = workspacesIn, 1, 4, default, slide
    #animation = workspacesOut, 1, 4, default, slide  
}

misc{
    font_family = Jetbrains Mono Nerd Font
  }


plugin:dynamic-cursors{
enabled = false
mode = rotate






  }


